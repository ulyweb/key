<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        :root {
            var(--bg-color): #030508;
            --panel-bg: rgba(13, 17, 28, 0.65);
            --accent: #00E6B8;
            --accent-glow: rgba(0, 230, 184, 0.4);
            --accent-danger: #FF4D4D;
            --accent-warn: #FFB84D;
            --text-main: #E2E8F0;
            --text-dim: #8B9BB4;
            --border-color: rgba(255, 255, 255, 0.1);
            --border-highlight: rgba(0, 230, 184, 0.5);
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-color: #F0F4F8;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --accent: #0284C7;
            --accent-glow: rgba(2, 132, 199, 0.4);
            --accent-danger: #E11D48;
            --accent-warn: #D97706;
            --text-main: #1E293B;
            --text-dim: #64748B;
            --border-color: rgba(0, 0, 0, 0.1);
            --border-highlight: rgba(2, 132, 199, 0.5);
            --input-bg: rgba(241, 245, 249, 0.7);
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        #networkCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }

        .dashboard {
            background-color: var(--panel-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 35px 45px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            margin: 40px 0;
            opacity: 0;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        #clockDisplay { font-weight: 600; letter-spacing: 0.5px; font-variant-numeric: tabular-nums; }
        .theme-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-main); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s ease; }
        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

        h2 { font-family: 'Inter', sans-serif; color: var(--text-main); text-transform: uppercase; letter-spacing: -0.03em; text-align: center; margin-top: 0; font-weight: 800; font-size: 2.2em; margin-bottom: 35px; }
        h2 span { color: var(--accent); font-weight: 400; }

        .control-panel { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 25px; }
        .mode-toggle { flex: 1; display: flex; gap: 10px; }
        .mode-btn { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-dim); padding: 12px; cursor: pointer; border-radius: 8px; font-family: inherit; font-weight: 600; transition: all 0.3s ease; }
        .mode-btn.active { background: rgba(0, 230, 184, 0.1); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        [data-theme="light"] .mode-btn.active { background: rgba(2, 132, 199, 0.1); }

        .input-group { margin-bottom: 22px; width: 100%; }
        label { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--text-dim); font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;}
        input[type="text"], input[type="password"], select { width: 100%; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 14px; font-size: 1.05em; font-family: 'Inter', sans-serif; font-weight: 500; border-radius: 8px; box-sizing: border-box; outline: none; transition: all 0.3s ease; }
        select { cursor: pointer; appearance: none; font-family: inherit;}
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

        .meter-container { margin-top: 10px; height: 6px; background: rgba(0, 0, 0, 0.3); border-radius: 3px; overflow: hidden; }
        .meter-bar { height: 100%; width: 0%; background: var(--accent-danger); transition: width 0.4s ease, background-color 0.4s ease; }
        .base-stats { font-size: 0.75em; color: var(--text-dim); margin-top: 6px; text-align: right; text-transform: uppercase; font-weight: 500;}

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin-top: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; margin-top: -8px; box-shadow: 0 0 10px var(--accent-glow); border: 2px solid var(--bg-color);}
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--border-color); border-radius: 2px; }

        .settings-row { display: flex; gap: 20px; }
        .hidden-panel { display: none; }

        .button-group { display: flex; gap: 15px; margin-top: 15px; }

        .output-text { color: var(--text-dim); font-size: 1.25em; font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; word-break: break-all; cursor: pointer; padding: 15px; border-radius: 6px; max-height: 150px; overflow-y: auto; transition: all 0.2s ease; }

    <script>
        class ParticleNetwork {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.isDark = true;
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.initParticles();
                this.animate();
            }
            resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
            setTheme(isDark) { this.isDark = isDark; }
            initParticles() {
                const count = Math.floor((window.innerWidth * window.innerHeight) / 15000);
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width, y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5, radius: Math.random() * 2 + 1
                    });
                }
            }
            animate() {
                requestAnimationFrame(() => this.animate());
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                const colorBase = this.isDark ? '0, 230, 184' : '2, 132, 199';
                for (let i = 0; i < this.particles.length; i++) {
                    let p = this.particles[i];
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0 || p.x > this.canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > this.canvas.height) p.vy *= -1;
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(${colorBase}, 0.3)`; this.ctx.fill();
                    for (let j = i + 1; j < this.particles.length; j++) {
                        let p2 = this.particles[j];
                        let dist = Math.sqrt(Math.pow(p.x - p2.x, 2) + Math.pow(p.y - p2.y, 2));
                        if (dist < 120) {
                            this.ctx.beginPath(); this.ctx.moveTo(p.x, p.y); this.ctx.lineTo(p2.x, p2.y);
                            this.ctx.strokeStyle = `rgba(${colorBase}, ${0.15 - dist/800})`; this.ctx.stroke();
                        }
                    }
                }
            }
        }

        class SystemVault {
            constructor() {
                this.state = {
                    mode: 'password',
                    finalGeneratedKey: "",
                    isKeyHidden: true,
                    isDarkMode: true,
                    wordlist: [...new Set(rawWordlist.split(' ').filter(word => word.length > 4))]
                };
                this.bgEngine = new ParticleNetwork('networkCanvas');
                this.cacheDOM();
                this.bindEvents();
                this.initClock();
                setTimeout(() => this.entranceAnimation(), 100);
            }

            cacheDOM() {
                this.dom = {
                    clock: document.getElementById('clockDisplay'), themeToggle: document.getElementById('themeToggle'),
                    modeBtns: document.querySelectorAll('.mode-btn'), passSettings: document.getElementById('passwordSettings'),
                    phraseSettings: document.getElementById('passphraseSettings'), baseInput: document.getElementById('basePassword'),
                    meterBar: document.getElementById('meterBar'), baseStats: document.getElementById('baseStats'),
                    baseQuality: document.getElementById('baseQuality'), lengthSlider: document.getElementById('lengthSlider'),
                    lengthValDisplay: document.getElementById('lengthValDisplay'), wordSlider: document.getElementById('wordSlider'),
                    wordValDisplay: document.getElementById('wordValDisplay'), separatorMode: document.getElementById('separatorMode'),
                    combineMode: document.getElementById('combineMode'), generateBtn: document.getElementById('generateBtn'),
                    resetBtn: document.getElementById('resetBtn'), outputEl: document.getElementById('output'),
                    toggleVisBtn: document.getElementById('toggleVisibilityBtn'), copyNotif: document.getElementById('copyNotification'),
                    outEntropyRaw: document.getElementById('outEntropyRaw'), outEntropyKeePass: document.getElementById('outEntropyKeePass'),
                    outTime: document.getElementById('outTime')
                };
            }

            bindEvents() {
                this.dom.themeToggle.addEventListener('click', () => this.toggleTheme());
                this.dom.modeBtns.forEach(btn => btn.addEventListener('click', (e) => this.switchMode(e.target.id === 'modePassword' ? 'password' : 'passphrase')));
                this.dom.lengthSlider.addEventListener('input', (e) => this.dom.lengthValDisplay.textContent = e.target.value);
                this.dom.wordSlider.addEventListener('input', (e) => this.dom.wordValDisplay.textContent = e.target.value);
                this.dom.baseInput.addEventListener('input', (e) => this.updateBaseEntropyUI(e.target.value));
                this.dom.toggleVisBtn.addEventListener('click', () => this.toggleVisibility());
                this.dom.outputEl.addEventListener('click', () => this.copyToClipboard());
                this.dom.resetBtn.addEventListener('click', () => this.resetVault());
                this.dom.generateBtn.addEventListener('click', () => this.generateKey());
            }

            switchMode(newMode) {
                this.state.mode = newMode;
                this.dom.modeBtns.forEach(btn => btn.classList.remove('active'));
                if (newMode === 'password') {
                    document.getElementById('modePassword').classList.add('active');
                    this.dom.passSettings.classList.remove('hidden-panel');
                    this.dom.phraseSettings.classList.add('hidden-panel');
                } else {
                    document.getElementById('modePassphrase').classList.add('active');
                    this.dom.passSettings.classList.add('hidden-panel');
                    this.dom.phraseSettings.classList.remove('hidden-panel');
                }
            }

            initClock() {
                const tick = () => this.dom.clock.textContent = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
                tick(); setInterval(tick, 1000);
            }

            toggleTheme() {
                this.state.isDarkMode = !this.state.isDarkMode;
                this.bgEngine.setTheme(this.state.isDarkMode);
                if (this.state.isDarkMode) {
                    document.documentElement.removeAttribute('data-theme');
                    this.dom.themeToggle.textContent = "☀️ Light Mode";
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    this.dom.themeToggle.textContent = "🌙 Dark Mode";
                }
            }

            // The KeePassXC Hybrid Estimator logic
            calculateHybridEntropy(password) {
                if (!password) return 0;
                let zxcvbnBits = 0;
                if (typeof zxcvbn !== 'undefined') {
                    zxcvbnBits = Math.max(0, Math.round(Math.log2(zxcvbn(password).guesses)));
                }
                
                // Shannon Pool Calculation
                let poolSize = 0;
                if (/[a-z]/.test(password)) poolSize += 26;
                if (/[A-Z]/.test(password)) poolSize += 26;
                if (/[0-9]/.test(password)) poolSize += 10;
                if (/[^a-zA-Z0-9]/.test(password)) poolSize += 32; // basic symbol pool
                
                let shannonBits = password.length > 0 ? Math.round(password.length * Math.log2(poolSize)) : 0;
                
                // Hybrid Logic: For long, high-variance strings, zxcvbn often fails to account for randomness.
                // KeePassXC style logic prioritizes the higher mathematically valid metric for generated strings.
                return Math.max(zxcvbnBits, shannonBits);
            }

            updateBaseEntropyUI(pwd) {
                let hybridBits = this.calculateHybridEntropy(pwd);
                this.dom.baseStats.textContent = `Hybrid Score: ${hybridBits} bits | Length: ${pwd.length}`;
                
                let width = Math.min((hybridBits / 128) * 100, 100);
                this.dom.meterBar.style.width = `${width}%`;
                
                const colors = { low: 'var(--accent-danger)', warn: 'var(--accent-warn)', strong: 'var(--accent)' };
                let status = hybridBits < 40 ? 'low' : hybridBits < 80 ? 'warn' : 'strong';
                this.dom.baseQuality.textContent = `Quality: ${hybridBits === 0 ? 'LOW' : status.toUpperCase()}`;
                this.dom.meterBar.style.backgroundColor = colors[status];
                this.dom.baseQuality.style.color = colors[status];
            }

            toggleVisibility() {
                this.state.isKeyHidden = !this.state.isKeyHidden;
                if (this.state.isKeyHidden) {
                    this.dom.outputEl.textContent = '•'.repeat(Math.min(this.state.finalGeneratedKey.length, 64)) + (this.state.finalGeneratedKey.length > 64 ? '...' : '');
                    this.dom.toggleVisBtn.textContent = "👁️ Reveal";
                } else {
                    this.dom.outputEl.textContent = this.state.finalGeneratedKey;
                    this.dom.toggleVisBtn.textContent = "🙈 Hide";
                }
            }

            copyToClipboard() {
                if (this.state.finalGeneratedKey) {
                    navigator.clipboard.writeText(this.state.finalGeneratedKey).then(() => {
                        anime({ targets: this.dom.copyNotif, opacity: [0, 1, 1, 0], translateY: [10, -10, -10, -30], duration: 1800, easing: 'easeOutExpo' });
                    });
                }
            }

            resetVault() {
                anime({ targets: this.dom.resetBtn, scale: [0.95, 1], duration: 300, easing: 'easeOutQuad' });
                this.dom.baseInput.value = "";
                this.dom.lengthSlider.value = 44; this.dom.lengthValDisplay.textContent = "44";
                this.dom.wordSlider.value = 6; this.dom.wordValDisplay.textContent = "6";
                this.dom.combineMode.value = "append";
                this.state.finalGeneratedKey = "";
                this.state.isKeyHidden = true;
                this.updateBaseEntropyUI("");
                this.dom.outputEl.classList.remove('ready');
                this.dom.toggleVisBtn.classList.add('hidden');
                this.dom.outputEl.style.color = 'var(--text-dim)';
                this.dom.outputEl.textContent = "AWAITING DEPLOYMENT...";
                this.dom.outEntropyRaw.textContent = "0-bit";
                this.dom.outEntropyKeePass.textContent = "0-bit";
                this.dom.outTime.textContent = "INFINITY";
                this.dom.outTime.style.color = "var(--accent)";
            }

            calculateBruteForceTime(totalEntropyBits) {
                if (totalEntropyBits > 80) return { text: "INFINITY", color: "var(--accent)" };
                if (totalEntropyBits === 0) return { text: "INSTANT", color: "var(--accent-danger)" };
                const seconds = Math.pow(2, totalEntropyBits) / 150000;
                if (seconds < 1) return { text: "< 1 SECOND", color: "var(--accent-danger)" };
                if (seconds < 60) return { text: `${Math.round(seconds)} SECONDS`, color: "var(--accent-danger)" };
                if (seconds < 3600) return { text: `${Math.round(seconds/60)} MINUTES`, color: "var(--accent-warn)" };
                if (seconds < 86400) return { text: `${Math.round(seconds/3600)} HOURS`, color: "var(--accent-warn)" };
                if (seconds < 31536000) return { text: `${Math.round(seconds/86400)} DAYS`, color: "var(--accent)" };
                return { text: `${Math.round(seconds/31536000).toLocaleString()} YEARS`, color: "var(--accent)" };
            }

            async generatePasswordString(basePassword, desiredLength) {
                if (desiredLength === 0) return "";
                const bitsRequired = Math.ceil((desiredLength * 6) / 8) * 8;
                const encoder = new TextEncoder();
                const keyMaterial = await window.crypto.subtle.importKey("raw", encoder.encode(basePassword), { name: "PBKDF2" }, false, ["deriveBits"]);
                const salt = window.crypto.getRandomValues(new Uint8Array(32));
                const derivedBits = await window.crypto.subtle.deriveBits({ name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, bitsRequired);
                return btoa(String.fromCharCode(...new Uint8Array(derivedBits))).slice(0, desiredLength);
            }

            generatePassphrase(wordCount, separator) {
                const words = [];
                const randomArray = new Uint32Array(wordCount);
                window.crypto.getRandomValues(randomArray);
                for (let i = 0; i < wordCount; i++) {
                    const randomIndex = randomArray[i] % this.state.wordlist.length;
                    words.push(this.state.wordlist[randomIndex]);
                }
                return words.join(separator);
            }

            shuffleString(str) {
                let arr = str.split('');
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr.join('');
            }

            async generateKey() {
                const baseStr = this.dom.baseInput.value;
                const mode = this.dom.combineMode.value;

                this.dom.toggleVisBtn.classList.add('hidden');
                if (!baseStr && mode !== 'keyOnly') {
                    this.dom.outputEl.classList.remove('ready');
                    this.state.finalGeneratedKey = "";
                    this.dom.outputEl.style.color = 'var(--accent-danger)';
                    this.dom.outputEl.textContent = "ERR: BASE STRING REQUIRED FOR MIXING";
                    return;
                }

                this.dom.outputEl.classList.remove('ready');
                this.state.finalGeneratedKey = "";
                this.state.isKeyHidden = true; 
                this.dom.toggleVisBtn.textContent = "👁️ Reveal";
                this.dom.outputEl.style.color = 'var(--text-dim)';
                this.dom.outputEl.textContent = "GENERATING ENTROPY...";

                try {
                    let cryptoCore = "";
                    let rawGeneratedEntropy = 0;

                    if (this.state.mode === 'password') {
                        const requestedLen = parseInt(this.dom.lengthSlider.value, 10);
                        cryptoCore = await this.generatePasswordString(baseStr || "fallback", requestedLen);
                        rawGeneratedEntropy = requestedLen * 6; 
                    } else {
                        const wordCount = parseInt(this.dom.wordSlider.value, 10);
                        const separator = this.dom.separatorMode.value;
                        cryptoCore = this.generatePassphrase(wordCount, separator);
                        rawGeneratedEntropy = Math.round(wordCount * Math.log2(this.state.wordlist.length));
                    }
                    
                    if (mode === 'keyOnly') this.state.finalGeneratedKey = cryptoCore;
                    else if (mode === 'append') this.state.finalGeneratedKey = baseStr + cryptoCore;
                    else if (mode === 'prepend') this.state.finalGeneratedKey = cryptoCore + baseStr;
                    else if (mode === 'shuffle') this.state.finalGeneratedKey = this.shuffleString(baseStr + cryptoCore);

                    // Combine base entropy mathematically for the raw score
                    let poolSize = 0;
                    if (/[a-z]/.test(baseStr)) poolSize += 26;
                    if (/[A-Z]/.test(baseStr)) poolSize += 26;
                    if (/[0-9]/.test(baseStr)) poolSize += 10;
                    if (/[^a-zA-Z0-9]/.test(baseStr)) poolSize += 32;
                    let rawBaseEntropy = baseStr.length > 0 ? Math.round(baseStr.length * Math.log2(poolSize)) : 0;
                    
                    let totalRawEntropy = (mode === 'keyOnly') ? rawGeneratedEntropy : rawBaseEntropy + rawGeneratedEntropy;
                    
                    // Use the new Hybrid Estimator
                    let totalHybridEntropy = this.calculateHybridEntropy(this.state.finalGeneratedKey);
                    const bruteForceData = this.calculateBruteForceTime(totalHybridEntropy);

                    setTimeout(() => {
                        if (this.state.finalGeneratedKey) {
                            this.dom.outputEl.textContent = '•'.repeat(Math.min(this.state.finalGeneratedKey.length, 64)) + (this.state.finalGeneratedKey.length > 64 ? '...' : '');
                            this.dom.toggleVisBtn.classList.remove('hidden');
                        } else {
                            this.dom.outputEl.textContent = "ERR: 0 LENGTH OUTPUT";
                        }

                        this.dom.outEntropyRaw.textContent = `${totalRawEntropy}-bit`;
                        this.dom.outEntropyKeePass.textContent = `${totalHybridEntropy}-bit`;
                        this.dom.outTime.textContent = bruteForceData.text;
                        this.dom.outTime.style.color = bruteForceData.color;
                        
                        this.dom.outputEl.style.color = this.state.finalGeneratedKey ? 'var(--accent)' : 'var(--accent-danger)';
                        if (this.state.finalGeneratedKey) this.dom.outputEl.classList.add('ready');

                        anime({ targets: this.dom.outputEl, opacity: [0, 1], translateY: [-5, 0], duration: 400, easing: 'easeOutQuad' });
                    }, 400);

                } catch (err) {
                    console.error(err);
                    this.dom.outputEl.classList.remove('ready');
                    this.state.finalGeneratedKey = "";
                    this.dom.outputEl.style.color = 'var(--accent-danger)';
                    this.dom.outputEl.textContent = "CRYPTOGRAPHIC FAILURE";
                }
            }

            entranceAnimation() {
                anime({ targets: '.dashboard', translateY: [30, 0], opacity: [0, 1], duration: 1000, easing: 'easeOutExpo' });
            }
        }

        document.addEventListener('DOMContentLoaded', () => new SystemVault());
    </script>
</body>
</html>
